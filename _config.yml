# Site settings
title: 'Koki Maeda'
description: 'Doctoral student exploring multimodal vision-and-language systems, evaluation metrics, and context-aware captioning.'
url: 'https://silviase.com'
baseurl: ''
timezone: 'Asia/Tokyo'
markdown: kramdown
permalink: /blog/:title/
future: true

# Collections
collections:
  papers:
    output: true
    permalink: /papers/:slug/

# Default front matter values
defaults:
  - scope:
      path: ''
    values:
      image: /assets/face/202503.png
  - scope:
      path: ''
      type: 'pages'
    values:
      layout: page
  - scope:
      path: ''
      type: 'posts'
    values:
      layout: post
      author: 'Koki Maeda'
  - scope:
      path: ''
      type: 'papers'
    values:
      layout: paper

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
author: Koki Maeda
locale: en_US
twitter:
  card: summary
  username: silviasetitech
social:
  name: Koki Maeda
  links:
    - https://github.com/Silviase
    - https://scholar.google.com/citations?user=TOHpU1IAAAAJ
    - https://linkedin.com/in/silviase

# Sass / assets
sass:
  sass_dir: assets/css
  style: compressed

# Build settings
exclude:
  - node_modules
  - vendor
  - Gemfile.lock
  - package-lock.json
  - README.md
  - CLAUDE.md
  - AGENTS.md
  - .cursor
